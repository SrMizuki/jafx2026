<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#050607">
<meta name="application-name" content="JAFX">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JAFX">
<meta name="description" content="JAFX is coming soon with an AI-native trading experience built for sharper forex execution.">
<meta property="og:site_name" content="JAFX">
<meta property="og:type" content="website">
<meta property="og:title" content="JAFX Coming Soon">
<meta property="og:image" content="ico.svg">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="JAFX Coming Soon">
<meta name="twitter:image" content="ico.svg">
<link rel="icon" href="ico.svg" type="image/svg+xml">
<link rel="shortcut icon" href="ico.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="ico.svg">
<title>JAFX Coming Soon</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #050607;
    --panel: rgba(9, 14, 17, 0.72);
    --text: #f3fbf8;
    --muted: rgba(243, 251, 248, 0.72);
    --soft: rgba(243, 251, 248, 0.12);
    --accent: #00e6a0;
    --accent-2: #66f7ff;
    --shadow: 0 32px 90px rgba(0, 0, 0, 0.42);
    --font-display: "Space Grotesk", "Inter", "Segoe UI", Arial, sans-serif;
    --font-body: "Inter", "Segoe UI", Arial, sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    min-height: 100%;
  }

  body {
    margin: 0;
    min-height: 100vh;
    overflow-x: hidden;
    background:
      radial-gradient(circle at 50% 20%, rgba(0, 230, 160, 0.18), transparent 32rem),
      radial-gradient(circle at 18% 80%, rgba(102, 247, 255, 0.12), transparent 28rem),
      linear-gradient(145deg, #020303 0%, #070b0d 54%, #030405 100%);
    color: var(--text);
    font-family: var(--font-body);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
    background-size: 76px 76px;
    mask-image: radial-gradient(circle at center, black, transparent 78%);
  }

  .mesh-stage {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
    overflow: hidden;
  }

  .mesh-stage canvas {
    width: 100vw !important;
    height: 100vh !important;
    mix-blend-mode: screen;
  }

  .page {
    position: relative;
    z-index: 2;
    display: grid;
    min-height: 100vh;
    place-items: center;
    padding: clamp(1.25rem, 4vw, 3rem);
  }

  .hero {
    position: relative;
    width: min(100%, 860px);
    text-align: center;
  }

  .hero::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: -1;
    width: 100%;
    height: 100%;
    border-radius: 100%;
    background-color: black;
    opacity: 0.75;
    filter: blur(50px);
    transform: translate(-50%, -50%);
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    margin-bottom: 2rem;
    padding: 0.58rem 0.9rem;
    border: 1px solid rgba(0, 230, 160, 0.28);
    border-radius: 999px;
    background: rgba(0, 230, 160, 0.08);
    backdrop-filter: blur(18px);
    color: rgba(243, 251, 248, 0.86);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .eyebrow::before {
    content: "";
    width: 0.55rem;
    height: 0.55rem;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 22px rgba(0, 230, 160, 0.9);
  }

  .logo {
    display: block;
    width: min(58vw, 250px);
    height: auto;
    margin: 0 auto 2rem;
    filter: drop-shadow(0 22px 38px rgba(0, 230, 160, 0.16));
  }

  h1 {
    max-width: 760px;
    margin: 0 auto;
    font-family: var(--font-display);
    font-size: clamp(2.5rem, 9vw, 6.2rem);
    line-height: 0.92;
    letter-spacing: -0.07em;
  }

  h1 span {
    display: block;
    margin-top: 0.25rem;
    padding-bottom: 20px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .status {
    margin: 1.6rem 0 0;
    color: rgba(243, 251, 248, 0.5);
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      scroll-behavior: auto !important;
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<div class="mesh-stage" aria-hidden="true">
  <canvas data-engine="three.js r160" width="1566" height="949" style="position: absolute; inset: 0px; width: 100vw; height: 100vh; pointer-events: none; opacity: 0.7;"></canvas>
</div>

<main class="page">
  <section class="hero" aria-labelledby="landing-title">
    <div class="eyebrow">Launching soon</div>
    <img class="logo" src="jafx-logo.svg" alt="JAFX">
    <h1 id="landing-title">AI-native forex is <span>coming soon.</span></h1>
    <p class="status">New JAFX experience in progress</p>
  </section>
</main>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="hero-mesh.js"></script>
<script>
  (function () {
    var canvas = document.querySelector('canvas[data-engine]');
    window.JAFXMesh?.mount?.(canvas, {
      variation: 'mesh',
      accent: '#00E6A0'
    });
  }());
</script>
</body>
</html>
