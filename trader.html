  .topbar-search { flex: 1 1 200px !important; max-width: 380px !important; min-width: 160px !important; white-space: nowrap !important; overflow: hidden !important; }

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body class="trader-body">
<div id="root"></div>

<script type="text/babel" src="app/shell.jsx"></script>
<script type="text/babel" src="app/cards.jsx"></script>
<script type="text/babel" src="app/rail.jsx"></script>
<script type="text/babel" src="app/screens.jsx"></script>
<script type="text/babel" src="app/trading-workspace.jsx"></script>
<script type="text/babel" src="app/ai-features.jsx"></script>
<script type="text/babel" src="app/workspace-v2.jsx"></script>
<script type="text/babel" src="app/copilot-drawer.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const SCREENS = [
  { id: 'v2',        label: 'AI trader (v2)',   comp: 'TradingWorkspaceV2WithCopilot' },
  { id: 'trader',    label: 'Web trader',       comp: 'TradingWorkspaceWithCopilot' },
  { id: 'workspace', label: 'Copilot canvas',   comp: 'ActiveWorkspace' },
  { id: 'ticket',    label: 'Order ticket',     comp: 'OrderTicketScreen' },
  { id: 'position',  label: 'Live position',    comp: 'LivePositionScreen' },
  { id: 'nudge',     label: 'Proactive nudge',  comp: 'NudgeScreen' },
  { id: 'stacked',   label: 'Stacked variant',  comp: 'StackedWorkspace' },
];

function TradingWorkspaceWithCopilot() {
  const [copilotOpen, setCopilotOpen] = useState(false);
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        setCopilotOpen(v => !v);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);
  return (
    <>
      <TradingWorkspace onOpenCopilot={() => setCopilotOpen(true)}/>
      <CopilotDrawer open={copilotOpen} onClose={() => setCopilotOpen(false)}/>
    </>
  );
}
window.TradingWorkspaceWithCopilot = TradingWorkspaceWithCopilot;

function TradingWorkspaceV2WithCopilot() {
  const [copilotOpen, setCopilotOpen] = useState(false);
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        setCopilotOpen(v => !v);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);
  return (
    <>
      <TradingWorkspaceV2 onOpenCopilot={() => setCopilotOpen(true)}/>
      <CopilotDrawer open={copilotOpen} onClose={() => setCopilotOpen(false)}/>
    </>
  );
}
window.TradingWorkspaceV2WithCopilot = TradingWorkspaceV2WithCopilot;

function App() {
  const initial = (typeof window !== 'undefined' && window.location.hash.replace('#','')) || localStorage.getItem('jafx-trader-screen') || 'v2';
  const [screen, setScreen] = useState(SCREENS.find(s => s.id === initial) ? initial : 'v2');

  useEffect(() => {
    localStorage.setItem('jafx-trader-screen', screen);
    if (window.location.hash.replace('#','') !== screen) window.location.hash = screen;
  }, [screen]);

  useEffect(() => {
    const onHash = () => {
      const h = window.location.hash.replace('#','');
      if (SCREENS.find(s => s.id === h)) setScreen(h);
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const Current = window[SCREENS.find(s => s.id === screen).comp];

  return (
    <>
      <Current/>
      <div className="screen-nav">
        {SCREENS.map(s => (
          <button key={s.id} className={screen === s.id ? 'active' : ''} onClick={() => setScreen(s.id)}>{s.label}</button>
        ))}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
