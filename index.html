<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- motion + 3D -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/motion@10.18.0/dist/motion.min.js"></script>
<script src="assets/hero-mesh.js"></script>
<script src="assets/motion.js"></script>
<script src="assets/markets-sphere.js"></script>
<script>
(function(){
  try { const t = localStorage.getItem('jafx-theme'); if(t) document.documentElement.setAttribute('data-theme', t); } catch(e){}
})();
const TWEAKS = /*EDITMODE-BEGIN*/{
  "heroVariant": "terminal",
  "accent": "#00E6A0",
  "density": "compact",
  "theme": "dark",
  "meshVariation": "mesh"
}/*EDITMODE-END*/;
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/hero.jsx"></script>
<script type="text/babel" src="components/ai-features.jsx"></script>
<script type="text/babel" src="components/sections.jsx"></script>
<script type="text/babel" src="components/feature-showcase.jsx"></script>
<script type="text/babel" src="components/broker-sections.jsx"></script>
<script type="text/babel" src="components/tweaks.jsx"></script>
<script type="text/babel">
function Home() {
  const [heroVariant, setHero] = React.useState(TWEAKS.heroVariant);
  const [accent, setAccent] = React.useState(TWEAKS.accent);
  const [density, setDensity] = React.useState(TWEAKS.density);
  const [meshVariation, setMesh] = React.useState(TWEAKS.meshVariation);
  React.useEffect(() => { document.documentElement.style.setProperty('--accent', accent); window.JAFXMesh?.setAccent?.(accent); }, [accent]);
  React.useEffect(() => { window.JAFXMesh?.setVariation?.(meshVariation); }, [meshVariation]);
  React.useEffect(() => { window.JAFXMotion?.init?.(); window.JAFXMotion?.refresh?.(); }, []);
  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent-glow', 'rgba(0,230,160,0.18)');
  }, [accent]);
  return (
    <>
      <Nav current="home"/>
      <LiveTicker/>
      <Hero variant={heroVariant} meshVariation={meshVariation}/>
      <TrustStripFull/>
      <FeatureGrid zone="intel"/>
      <MarketsTabbed/>
      <SpreadsExecution/>
      <PlatformsStrip/>
      <WhyJafx zone="funding"/>
      <TrustStrip/>
      <Testimonials/>
      <CtaBand zone="execution"/>
      <Footer/>
      <Tweaks state={{heroVariant, accent, density, meshVariation}} setters={{setHero, setAccent, setDensity, setMesh}}/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Home/>);
</script>
</body>
</html>
